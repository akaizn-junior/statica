<!doctype html>
<html lang="en" data-bind="{headline, published_at, summary, html}">
  <head>
    <meta charset="utf-8" />
    <title><slot name="headline"></slot></title>
    <link rel="stylesheet" href="/site.css" />
    <link
      rel="statica/font"
      href="@Google/?family=Outfit:wght@400;600&display=swap"
    />
    <link
      rel="statica/fragment"
      type="text/html"
      href="../../ui/post-card.html"
      id="post-card"
    />
    <link
      rel="statica/fragment"
      type="text/html"
      href="../../ui/related-posts.html"
      id="related-posts"
    />
    <script type="statica/data" src="../../content/posts" id="posts"></script>
  </head>
  <body>
    <article>
      <header>
        <h1><slot name="headline"></slot></h1>
        <time><slot name="published_at"></slot></time>
      </header>
      <p><slot name="summary"></slot></p>
      <div><slot name="html"></slot></div>
      <slot id="post-card" data-bind="."></slot>
      <slot id="related-posts">More from the archive</slot>
    </article>
    <p><a href="/blog/">← All posts</a></p>
  </body>
</html>
